---
- name: Setup Midnight Pre-Production FNO Node
  hosts: all
  become: yes
  vars:
    node_user: midnight
    node_home: /home/midnight
    db_user: midnight
    db_password: YOUR_POSTGRES_PASSWORD
    db_name: cexplorer
    midnight_node_name: midnight-archive-node
  roles:
    - common
    - postgres
    - cardano_node
    - midnight_node
