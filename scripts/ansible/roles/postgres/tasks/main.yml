---
- name: Add PostgreSQL APT key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL APT repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt/ {{ ansible_distribution_release }}-pgdg main"
    state: present

- name: Install PostgreSQL 17 and psycopg2
  apt:
    name:
      - postgresql-17
      - postgresql-server-dev-17
      - postgresql-client-17
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Ensure PostgreSQL service is running
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Create PostgreSQL user for Midnight
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    role_attr_flags: CREATEDB,SUPERUSER

- name: Create PostgreSQL database for Cardano DB Sync
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_user }}"

- name: Tune postgresql.conf for Cardano DB Sync
  become: yes
  lineinfile:
    path: /etc/postgresql/17/main/postgresql.conf
    regexp: "^{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: 'shared_buffers', value: '16GB' }
    - { key: 'maintenance_work_mem', value: '4GB' }
    - { key: 'max_parallel_maintenance_workers', value: '4' }
    - { key: 'effective_cache_size', value: '48GB' }

- name: Restart PostgreSQL after tuning
  service:
    name: postgresql
    state: restarted

- name: Create .pgpass file for db-sync authentication
  become: yes
  become_user: "{{ node_user }}"
  copy:
    dest: "{{ node_home }}/.pgpass"
    content: "*:5432:{{ db_name }}:{{ db_user }}:{{ db_password }}\n"
    mode: '0600'
    owner: "{{ node_user }}"
