---
- name: Create directories for Midnight Validator Node
  become: yes
  become_user: "{{ node_user }}"
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ node_home }}/data"
    - "{{ node_home }}/res"
    - "{{ node_home }}/tmp"

- name: Download Midnight Node release
  become: yes
  become_user: "{{ node_user }}"
  get_url:
    url: "https://github.com/midnightntwrk/midnight-node/releases/download/node-0.22.2/midnight-node-0.22.2-linux-amd64.tar.gz"
    dest: "{{ node_home }}/tmp/midnight-node-0.22.2.tar.gz"

- name: Extract Midnight Node
  become: yes
  become_user: "{{ node_user }}"
  unarchive:
    src: "{{ node_home }}/tmp/midnight-node-0.22.2.tar.gz"
    dest: "{{ node_home }}/tmp"
    remote_src: yes

- name: Move Midnight node binary
  command: mv {{ node_home }}/tmp/midnight-node {{ node_home }}/.local/bin/
  args:
    creates: "{{ node_home }}/.local/bin/midnight-node"

- name: Move Midnight res directory
  command: mv {{ node_home }}/tmp/res {{ node_home }}/
  args:
    creates: "{{ node_home }}/res/{{ network }}"

- name: Ensure midnight-node is executable
  file:
    path: "{{ node_home }}/.local/bin/midnight-node"
    mode: '0755'
    owner: "{{ node_user }}"

- name: Template env file
  become: yes
  become_user: "{{ node_user }}"
  template:
    src: env.j2
    dest: "{{ node_home }}/.env"
    mode: '0600'

- name: Configure systemd service for Validator Node
  become: yes
  template:
    src: midnight-node.service.j2
    dest: /etc/systemd/system/midnight-node.service
    mode: '0644'
  notify: restart midnight-node
